
{{- $values := .Values -}}
{{- $template := .Template }}
{{- $chart := .Chart -}}
{{- $release := .Release -}}
{{- $files := .Files }}
{{- $capabilities := .Capabilities -}}
{{- $global := .Values.global }}
{{- $defaultDbOperatorEnvironment := ""}}
{{- $defaultWbOperatorEnvironment := ""}}
{{- if ne (kindOf $global) "map" }}
  {{- $global = dict "namespace"  .Release.Namespace }}  
{{- end}}

{{- /* validate common values  environment and providers */ -}}
{{- $allowedEnvironments := list "onPrem" "saas" "marketPlace" }}
{{- $allowedOnPremProviders := list "k3s" "kind" "eks" "aks" "other" }}
{{- $allowedSaasProviders := list "eks"  }}
{{- $allowedMarketPlaceProviders := list "aks" "eks" }}

{{- if $values.db }}
  {{- fail (printf "Use '.kineticacluster' instead of '.db' in all sets and value files") }}
{{- end }}

{{- if $values.dbWorkbench }}
  {{- fail (printf "Use '.workbench' instead of '.dbWorkbench' in all sets and value files") }}
{{- end }}

{{- if not (has $values.environment $allowedEnvironments) }}
  {{- fail (printf "%s - %s - %s - " "Not an allowed environment" $values.environment "Allowed are " ($allowedEnvironments  | join "/")) }}
{{- end }}

{{- if eq $values.environment "onPrem"}}
  {{- if not (has $values.provider $allowedOnPremProviders) }}
    {{- fail (printf "%s - %s - %s - " "Not an allowed provider" $values.provider "Allowed are " ($allowedOnPremProviders|join "/")) }}
  {{- end }}  
{{- end}}

{{- if eq $values.environment "saas"}}
  {{- if not (has $values.provider $allowedSaasProviders) }}
    {{- fail (printf "%s - %s - %s - " "Not an allowed provider" $values.provider "Allowed are " ($allowedSaasProviders|join "/")) }}
  {{- end }}  
  {{- $defaultDbOperatorEnvironment = "saas-eks" }}
{{- end}}

{{- if eq $values.environment "marketPlace"}}
  {{- if not (has $values.provider $allowedMarketPlaceProviders) }}
    {{- fail (printf "%s - %s - %s - " "Not an allowed provider" $values.provider "Allowed are " ($allowedMarketPlaceProviders|join "/")) }}
  {{- end }}
  {{- if eq $values.provider "aks" }}
    {{- $defaultDbOperatorEnvironment = $values.provider }}
    {{- $defaultWbOperatorEnvironment = $values.provider }}
  {{- end }}
  {{- if eq $values.provider "eks" }}
   {{- $defaultDbOperatorEnvironment = $values.provider }}
  {{- end }}
{{- end}}

{{- $dbOperator := $values.dbOperator }}
{{- $wbOperator := $values.wbOperator }}

{{- /* validate dbOperator values */ -}}
{{- if not (eq (kindOf $dbOperator) "map")}}
  {{- fail "No Configuration found for .Values.dbOperator" }}
{{- end }}


{{- /* validate wbOperator values */ -}}
{{- if not (eq (kindOf $wbOperator) "map")}}
  {{- fail "No Configuration found for .Values.wbOperator" }}
{{- end }}

{{- /* validate that when both the KineticaCluster and Workbench are installed the
       Workbench's spec.clusterRef points at the KineticaCluster the chart creates.
       - clusterRef.name must match the KineticaCluster's metadata.name. That name
         defaults to "kineticacluster" when kineticacluster.name is empty, so mirror
         the subchart default here.
       - The namespace the Workbench resolves the KineticaCluster in must match the
         KineticaCluster's own namespace. When clusterRef.namespace is set explicitly
         we use it; when it is empty the operator defaults it to the Workbench's own
         namespace, so we compare against that instead. Both the KineticaCluster and
         Workbench namespaces fall back to the release namespace when unset. */ -}}
{{- if and (eq (kindOf $values.kineticacluster) "map") (eq (kindOf $values.workbench) "map") }}
  {{- if and $values.kineticacluster.install $values.workbench.install }}
    {{- $kcName := $values.kineticacluster.name | default "kineticacluster" }}
    {{- $kcNamespace := $release.Namespace }}
    {{- if eq (kindOf $values.kineticacluster.namespace) "string" }}
      {{- if ne $values.kineticacluster.namespace "" }}
        {{- $kcNamespace = $values.kineticacluster.namespace }}
      {{- end }}
    {{- end }}
    {{- /* the Workbench's own namespace — the fallback for an unset clusterRef.namespace */ -}}
    {{- $wbNamespace := $release.Namespace }}
    {{- if eq (kindOf $values.workbench.namespace) "string" }}
      {{- if ne $values.workbench.namespace "" }}
        {{- $wbNamespace = $values.workbench.namespace }}
      {{- end }}
    {{- end }}
    {{- $wbClusterRefName := "" }}
    {{- $wbClusterRefNsExplicit := false }}
    {{- $wbClusterRefNamespace := $wbNamespace }}
    {{- if eq (kindOf $values.workbench.clusterRef) "map" }}
      {{- $wbClusterRefName = $values.workbench.clusterRef.name | default "" }}
      {{- if eq (kindOf $values.workbench.clusterRef.namespace) "string" }}
        {{- if ne $values.workbench.clusterRef.namespace "" }}
          {{- $wbClusterRefNamespace = $values.workbench.clusterRef.namespace }}
          {{- $wbClusterRefNsExplicit = true }}
        {{- end }}
      {{- end }}
    {{- end }}
    {{- if ne $kcName $wbClusterRefName }}
      {{- fail (printf "workbench.clusterRef.name (%q) must match kineticacluster.name (%q) when both kineticacluster.install and workbench.install are true. The Workbench references its KineticaCluster by metadata.name; note kineticacluster.name defaults to \"kineticacluster\" when left empty." $wbClusterRefName $kcName) }}
    {{- end }}
    {{- if ne $wbClusterRefNamespace $kcNamespace }}
      {{- if $wbClusterRefNsExplicit }}
        {{- fail (printf "workbench.clusterRef.namespace (%q) must match the KineticaCluster's namespace (%q) when both are installed." $wbClusterRefNamespace $kcNamespace) }}
      {{- else }}
        {{- fail (printf "the Workbench namespace (%q) must match the KineticaCluster's namespace (%q) when both are installed and workbench.clusterRef.namespace is unset, since the operator then resolves the KineticaCluster in the Workbench's own namespace. Either install both into the same namespace, or set workbench.clusterRef.namespace to %q." $wbNamespace $kcNamespace $kcNamespace) }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}


{{- if $values.certManager.install }}
  {{- $webhook := (dict "url" dict) }}
  {{- $values = merge (dict "webhook" $webhook) $values }}
{{- end }}


{{- if and $values.kineticacluster.install (not $values.kineticacluster.gpudbCluster.config.tieredStorage.generateStorageClasses) (and (eq $values.kineticacluster.gpudbCluster.config.tieredStorage.persistTier.default.volumeClaim.spec.storageClassName "") (eq $values.global.defaultStorageClass "")) }}
  {{- fail "When kineticacluster.spec.gpudbCluster.config.tieredStorage.generateStorageClasses is set to false, a storage class must be provided fo kineticacluster.spec.gpudbCluster.config.tieredStorage.volumeClaim.spec.storageClassName or global.defaultStorageClass" }}
{{- end }}

{{- /* Resolve license from secret or direct value and inject into kineticacluster values */ -}}
{{- if $values.kineticacluster.install }}
  {{- $resolvedLicense := include "kinetica-operators.resolveLicense" (dict "Values" $values "Release" $release) }}
  {{- $_ := set $values.kineticacluster.gpudbCluster "license" $resolvedLicense }}
{{- end }}

{{- /* create the final values */ -}}
{{- $values = merge (dict "global" $global) $values}}

{{- $values = merge (dict "dbOperator" $dbOperator) (dict "wbOperator" $wbOperator) $values}}
{{- $data := merge (dict "Files" $files) (dict "Values" $values) (dict "Capabilities" $capabilities) (dict "Chart" $chart) (dict "Release" $release) (dict "Template" $template)}}

---

{{- if ($values.upsertKineticaCrds.enabled) }}
  {{- include "kinetica-operators.crds" $data }}
  {{- if ($values.upsertKineticaCrds.installRbac) }}
    {{- include "kinetica-operators.crds-rbac" $data }}
  {{- end }}
{{- end }}

---

{{- if eq (kindOf $values.tlsTermination) "map" }}
  {{- if eq (kindOf $values.tlsTermination.database) "map" }}
    {{- include "kinetica-operators.tls-db-secret" $data }}
  {{- end }}
  {{- if eq (kindOf $values.tlsTermination.workbench) "map" }}
    {{- include "kinetica-operators.tls-wb-secret" $data }}
  {{- end }}
{{- end }}

---
{{- if and (not $dbOperator.install) $wbOperator.install }}
  {{- include "kinetica-operators.eks-dboperator-namespaces" $data }}
{{- end }}

---
{{- if $dbOperator.install }}
  {{- include "kinetica-operators.all-dboperator-rbac" $data }}
  {{- include "kinetica-operators.all-dboperator-conf" $data }}
  {{- if and (eq $values.environment "marketPlace") (eq $values.provider "eks") }}
      {{- include "kinetica-operators.eks-dboperator-namespaces" $data }}
      {{- include "kinetica-operators.eks-dboperator-operator" $data }}
      {{- include "kinetica-operators.eks-dboperator-monitoring" $data }}
      {{- include "kinetica-operators.eks-dboperator-metering" $data }}
  {{- else if and (eq $values.environment "marketPlace") (eq $values.provider "aks") }}
      {{- include "kinetica-operators.aks-dboperator-namespaces" $data }}
      {{- include "kinetica-operators.aks-dboperator-operator" $data }}
      {{- include "kinetica-operators.aks-dboperator-monitoring" $data }}   
      {{- include "kinetica-operators.aks-dboperator-metering" $data }}    
  {{- else if and (eq $values.environment "saas") (eq $values.provider "eks") }}
      {{- include "kinetica-operators.saas-eks-dboperator-namespaces" $data }}
      {{- include "kinetica-operators.saas-eks-dboperator-operator" $data }}
      {{- include "kinetica-operators.saas-eks-dboperator-monitoring" $data }}
      {{- include "kinetica-operators.saas-eks-dboperator-metering" $data }}
  {{- else }}
      {{- include "kinetica-operators.local-dboperator-namespaces" $data }}
      {{- include "kinetica-operators.local-dboperator-operator" $data -}}
      {{- include "kinetica-operators.local-dboperator-monitoring" $data }}
      {{- include "kinetica-operators.local-dboperator-metering" $data }}       
  {{- end }}

  {{- if $values.dbOperator.rbac.installClusterRoles.nodes }}
      {{- include "kinetica-operators.all-dboperator-nodeclusterrole" $data }}
  {{- end }}
  {{- if $values.dbOperator.rbac.installClusterRoles.storageClasses }}
      {{- include "kinetica-operators.all-dboperator-scclusterrole" $data }}
  {{- end }}
{{- end }}
 
---

{{- if $wbOperator.install }}
  {{- include "kinetica-operators.all-wboperator-conf" $data }}
  {{- include "kinetica-operators.all-wboperator-rbac" $data }}
  {{- include "kinetica-operators.all-wboperator-operator" $data }}
{{- end}}

---

{{- if ($values.kineticacluster.install) }}
  {{- if ($values.ingressNginx.install) }}
    {{- include "kinetica-operators.ingress" $data }}
  {{- end}}
  {{- if $values.dbAdminUser.create }}
    {{- include "kinetica-operators.db-admin-user" $data}}
  {{- end }}
  {{- include "kinetica-operators.post-install-secret-patch" $data }}
  {{- if and $values.certManager.install (eq (kindOf $values.kineticacluster.gpudbCluster) "map") }}
    {{- if eq (kindOf $values.kineticacluster.gpudbCluster.letsEncrypt) "map" }}
      {{- if kindOf $values.kineticacluster.gpudbCluster.letsEncrypt.enabled }}
        {{- if eq $values.kineticacluster.gpudbCluster.letsEncrypt.environment "production" }}    
          {{- include "kinetica-operators.all-dboperator-productionIssuer" $data}}
        {{- else }}
          {{- include "kinetica-operators.all-dboperator-stagingIssuer" $data}}
        {{- end }}
      {{- end }}
    {{- end }}
  {{- end}}
{{- end }}

{{- if ($values.workbench.install) }}
  {{- include "kinetica-operators.db-workbench" $data}}
{{- end }}

---
{{- if eq $defaultDbOperatorEnvironment "saas-eks"}}
{{- include "kinetica-operators.all-dboperator-productionIssuer" $data}}
---
{{- include "kinetica-operators.all-dboperator-stagingIssuer" $data}}
---
{{- $requiredSc := printf "%s-storageclass" $values.clusterName }}

{{- end }}
---
