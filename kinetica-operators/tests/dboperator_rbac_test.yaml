suite: DB operator RBAC
values:
  - __base_values.yaml

tests:
  - it: creates controller-manager ServiceAccount
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: controller-manager
          any: true

  # ----- ClusterRole triads -----
  - it: creates kineticacluster admin ClusterRole
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kineticacluster-admin-role
          any: true

  - it: creates kineticacluster editor ClusterRole
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kineticacluster-editor-role
          any: true

  - it: creates kineticacluster viewer ClusterRole
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kineticacluster-viewer-role
          any: true

  - it: creates kineticauser admin ClusterRole
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kineticauser-admin-role
          any: true

  - it: creates kineticauser editor ClusterRole
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kineticauser-editor-role
          any: true

  - it: creates kineticauser viewer ClusterRole
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kineticauser-viewer-role
          any: true

  - it: creates metrics-auth-role ClusterRole
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: metrics-auth-role
          any: true

  # ----- RoleBindings -----
  - it: creates manager-rolebinding in cluster namespace
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-rolebinding
          namespace: gpudb
          any: true

  - it: creates leader-election-rolebinding
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: leader-election-rolebinding
          any: true

  - it: creates metrics-auth-rolebinding
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: metrics-auth-rolebinding
          any: true

  # ----- Suppression -----
  - it: suppresses all RBAC when dbOperator disabled
    template: kinetica_operators.yaml
    set:
      dbOperator.install: false
    asserts:
      - not: true
        containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: controller-manager
          any: true
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kineticacluster-admin-role
          any: true
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: metrics-auth-role
          any: true
