suite: DB operator RBAC
values:
  - __base_values.yaml

tests:
  - it: creates controller-manager ServiceAccount
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: controller-manager
          any: true

  # ----- Operator Roles -----
  # The dboperator ships namespaced Role/RoleBinding pairs (from config/rbac).
  # The per-CRD editor/viewer/admin ClusterRoles are kubebuilder scaffolding
  # and are not wired into the chart, so they are not asserted here.
  - it: creates manager Role in cluster namespace
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role
          namespace: gpudb
          any: true

  - it: creates leader-election Role
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: leader-election-role
          any: true

  # ----- RoleBindings -----
  - it: creates manager-rolebinding in cluster namespace
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-rolebinding
          namespace: gpudb
          any: true

  - it: creates leader-election-rolebinding
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: leader-election-rolebinding
          any: true

  # ----- Suppression -----
  - it: suppresses all RBAC when dbOperator disabled
    template: kinetica_operators.yaml
    set:
      dbOperator.install: false
    asserts:
      - not: true
        containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: controller-manager
          any: true
      - not: true
        containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role
          any: true
      - not: true
        containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-rolebinding
          any: true
