# Shared minimal values satisfying all validators for helm-unittest.
# Individual tests override specific values via `set:`.
#
# NOTE: `lookup` always returns nil in helm-unittest (same as `helm template`),
# so namespace existence checks always evaluate to "create the namespace" and
# secret-based license/password resolution falls through to direct values.

environment: "onPrem"
provider: "kind"

clusterName: "test-cluster"
clusterRegion: "us-east-1"
letsEncryptEmail: "test@kinetica.com"
openshift: false
createNamespaces: true

global:
  defaultStorageClass: "standard"
  image:
    registry: "test.registry.io"
    tag: "v0.0.1-test"

kubectlImage: "rancher/kubectl:v1.32.8"

upsertKineticaCrds:
  enabled: false
  installRbac: false
  image:
    repository: "upsert-kinetica-crds"
    tag: "v0.0.1-test"

kubeRbacProxy:
  image:
    repository: "quay.io/brancz/kube-rbac-proxy"
    tag: "v0.20.0"

kubeStateMetrics:
  install: false
  image:
    repository: "registry.k8s.io/kube-state-metrics/kube-state-metrics"
    tag: "v2.10.1"

otelCollector:
  install: true
  installRbac: false
  image:
    repository: "otel/opentelemetry-collector-contrib"
    tag: "0.95.0"

fluentBit:
  image:
    repository: "fluent-bit"
    tag: "v0.0.1-test"

wbOperator:
  install: true
  image:
    repository: "workbench-operator"
    tag: "v0.0.1-test"
    digest: ""

dbOperator:
  install: true
  aadpodidbinding: ""
  image:
    repository: "kinetica-k8s-operator"
    tag: "v0.0.1-test"
    digest: ""
  monitoring:
    type: "otel"
    otel:
      url: "otel-collector.kinetica-system.svc.cluster.local:4317"
  rbac:
    installRoles:
      velero: false
    installClusterRoles:
      nodes: false
      storageClasses: false

nodeSelector: {}
tolerations: []
affinity: {}

certManager:
  install: true
"cert-manager":
  crds:
    enabled: true
  namespace: kinetica-system

ingressNginx:
  install: true
"ingress-nginx":
  namespaceOverride: "gpudb"
  fullnameOverride: "ingress-nginx"
  tcp: {}
  defaultBackend:
    enabled: true
    image:
      image: "kinetica-default-backend"
      tag: "v0.0.1-test"
      digest: ""
    nodeSelector: {}
    extraEnvs: []
  controller:
    image:
      image: "ingress-nginx-controller"
      tag: "v0.0.1-test"
      digest: ""
      digestChroot: ""
    nodeSelector: {}
    allowSnippetAnnotations: true
    config:
      annotations-risk-level: Critical
      use-forwarded-headers: "true"
    scope:
      enabled: true
      namespace: "gpudb"
    service:
      annotations: {}
    admissionWebhooks:
      enabled: true
      patch:
        enabled: true
        image:
          repository: k8s.gcr.io/ingress-nginx/kube-webhook-certgen
          tag: v1.1.1
          digest: ""
    watchIngressWithoutClass: true
  rbac:
    create: false
    scope: true

gpuOperator:
  install: false

openldap:
  containerSecurityContext:
    enabled: true
  openldapNamespace: "gpudb"
  fullnameOverride: "openldap"
  global:
    ldapPort: 1389
  image:
    registry: ""
    repository: "openldap"
    tag: ""
  env:
    LDAP_BACKEND: "mdb"
    LDAP_ORGANISATION: "Kinetica DB Inc."
    LDAP_DOMAIN: "kinetica.com"
  persistence:
    enabled: true
    storageClass: ""

supportBundle:
  install: true
"support-bundle":
  image:
    registry: ""
    repository: "support-bundle"
    digest: ""
    pullPolicy: IfNotPresent
    tag: ""
  configMap:
    cluster: ""

kineticacluster:
  install: true
  payAsYouGo: false
  name: "test-kc"
  namespace: gpudb
  debug: false
  deploymentType:
    type: on_prem
    region: on_prem_local
  autoSuspend:
    enabled: false
  hostManagerMonitor:
    monitorRegistryRepositoryTag:
      registry: "kinetica.azurecr.io/dev"
      repository: kinetica-k8s-monitor
      tag: "0.0.1"
    livenessProbe:
      failureThreshold: 30
  ingressController: nginx
  authentication:
    type: LDAP
    ldap:
      baseDN: dc=kinetica,dc=com
      bindDN: cn=admin,dc=kinetica,dc=com
      host: openldap
      isInLocalK8S: true
      isLDAPS: false
      namespace: gpudb
      port: 1389
  supportingImages:
    busybox:
      registry: "test.registry.io"
      repository: busybox
      tag: "v0.0.1-test"
  gadmin:
    isEnabled: true
    containerPort:
      name: gadmin
      protocol: TCP
      containerPort: 8080
  reveal:
    isEnabled: true
    containerPort:
      name: reveal
      protocol: TCP
      containerPort: 8088
  generateIngressRecords: true
  gpudbCluster:
    useTShirt: false
    hasPools: false
    ranksPerNode: 1
    replicas: 1
    fqdn: "local.kinetica"
    clusterName: "cluster0"
    letsEncrypt:
      enabled: false
      environment: "staging"
    license: "FAKE-LICENSE-KEY-FOR-TESTING"
    licenseSecretName: "kinetica-license"
    dbRegistryRepositoryTag:
      registry: "kinetica.azurecr.io/dev"
      repository: kinetica-k8s-cpu
      tag: "0.0.1"
    metricsRegistryRepositoryTag:
      registry: ""
      repository: fluent-bit
      tag: ""
    config:
      postgresProxy:
        enablePostgresProxy: true
      kifs:
        enable: true
        mountPoint: /gpudb/kifs
      procs:
        enable: true
      textSearch:
        enableTextSearch: true
      tieredStorage:
        generateStorageClasses: false
        allowAutoSizing: false
        globalTier:
          colocateDisks: true
        persistTier:
          default:
            limit: ""
            provisioner: ""
            volumeClaim:
              spec:
                storageClassName: ""
                accessModes:
                  - "ReadWriteOnce"

dbAdminUser:
  create: true
  name: "kadmin"
  password: "TestP@ssw0rd123"
  adminUserSecretName: "kinetica-admin-creds"

workbench:
  install: true
  name: workbench
  namespace: gpudb
  # Must match kineticacluster.name above (the KineticaCluster metadata.name).
  clusterRef:
    name: "test-kc"
  fqdn: "local.kinetica"
  letsEncrypt:
    enabled: false
    environment: "staging"
  nodeSelector: {}
  storageClass: ""
  secureNetwork: false
  wbRegistryRepositoryTag:
    registry: "kinetica.azurecr.io/dev"
    repository: workbench
    tag: "0.0.1"

networkPolicies:
  install: false
