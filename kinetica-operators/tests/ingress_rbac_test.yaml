suite: Ingress RBAC
values:
  - __base_values.yaml

tests:
  - it: creates ingress-nginx Role when both kineticacluster and ingressNginx enabled
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: ingress-nginx
          namespace: gpudb
          any: true

  - it: creates ingress-nginx RoleBinding when both enabled
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: ingress-nginx
          namespace: gpudb
          any: true

  - it: no ingress RBAC when kineticacluster disabled
    template: kinetica_operators.yaml
    set:
      kineticacluster.install: false
    asserts:
      - not: true
        containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: ingress-nginx
          any: true
      - not: true
        containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: ingress-nginx
          any: true

  - it: no ingress RBAC when ingressNginx disabled
    template: kinetica_operators.yaml
    set:
      ingressNginx.install: false
    asserts:
      - not: true
        containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: ingress-nginx
          any: true
      - not: true
        containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: ingress-nginx
          any: true
