suite: saas/eks dispatch
# NOTE: The chart references kinetica-operators.saas-eks-dboperator-operator
# which has no corresponding template file yet. Tests disable dbOperator to
# avoid that missing include and verify the resources that ARE testable.
values:
  - __base_values.yaml

tests:
  - it: renders for saas/eks with dbOperator disabled
    template: kinetica_operators.yaml
    set:
      environment: "saas"
      provider: "eks"
      dbOperator.install: false
    asserts:
      - notFailedTemplate: {}

  - it: creates both ClusterIssuers unconditionally for saas-eks
    template: kinetica_operators.yaml
    set:
      environment: "saas"
      provider: "eks"
      dbOperator.install: false
    asserts:
      - containsDocument:
          kind: ClusterIssuer
          apiVersion: cert-manager.io/v1
          name: letsencrypt-production
          any: true
      - containsDocument:
          kind: ClusterIssuer
          apiVersion: cert-manager.io/v1
          name: letsencrypt-staging
          any: true

  - it: creates saas-eks namespaces via wb-only path
    template: kinetica_operators.yaml
    set:
      environment: "saas"
      provider: "eks"
      dbOperator.install: false
    asserts:
      - containsDocument:
          kind: Namespace
          apiVersion: v1
          name: gpudb
          any: true

  - it: creates WB operator for saas/eks
    template: kinetica_operators.yaml
    set:
      environment: "saas"
      provider: "eks"
      dbOperator.install: false
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: workbench-operator-controller-manager
          any: true
