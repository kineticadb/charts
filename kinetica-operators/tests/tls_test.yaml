suite: TLS secrets for database and workbench
values:
  - __base_values.yaml

tests:
  - it: no TLS secrets by default (no tlsTermination key)
    template: kinetica_operators.yaml
    asserts:
      - not: true
        containsDocument:
          kind: Secret
          apiVersion: v1
          name: kinetica-tls
          namespace: gpudb
          any: true

  - it: creates kinetica-tls Secret when database TLS is set
    template: kinetica_operators.yaml
    set:
      tlsTermination:
        database:
          certificate: "dGVzdC1jZXJ0"
          privateKey: "dGVzdC1rZXk="
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: kinetica-tls
          namespace: gpudb
          any: true

  - it: creates kinetica-tls Secret when workbench TLS is set
    template: kinetica_operators.yaml
    set:
      tlsTermination:
        workbench:
          certificate: "dGVzdC1jZXJ0"
          privateKey: "dGVzdC1rZXk="
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: kinetica-tls
          namespace: gpudb
          any: true

  - it: TLS secret has correct type
    template: kinetica_operators.yaml
    set:
      tlsTermination:
        database:
          certificate: "dGVzdC1jZXJ0"
          privateKey: "dGVzdC1rZXk="
    asserts:
      - equal:
          path: type
          value: kubernetes.io/tls
        documentSelector:
          path: metadata.name
          value: kinetica-tls
