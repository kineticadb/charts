suite: otelCollector and kubeStateMetrics toggles
values:
  - __base_values.yaml

tests:
  # ----- otel collector -----
  - it: creates otel ConfigMap when otelCollector enabled
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: otel-collector-conf
          any: true

  - it: creates otel Service when otelCollector enabled
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: otel-collector
          any: true

  - it: creates otel Deployment when otelCollector enabled
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: otel-collector
          any: true

  - it: creates otel ServiceAccount
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: opentelemetry-collector
          any: true

  - it: no otel Deployment when disabled
    template: kinetica_operators.yaml
    set:
      otelCollector.install: false
    asserts:
      - not: true
        containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: otel-collector
          any: true

  # ----- otel RBAC -----
  - it: creates otel ClusterRole when installRbac true
    template: kinetica_operators.yaml
    set:
      otelCollector.installRbac: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: otel-collector-role
          any: true

  - it: creates otel ClusterRoleBinding when installRbac true
    template: kinetica_operators.yaml
    set:
      otelCollector.installRbac: true
    asserts:
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: otel-collector-role-binding
          any: true

  - it: no otel ClusterRole when installRbac false
    template: kinetica_operators.yaml
    set:
      otelCollector.installRbac: false
    asserts:
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: otel-collector-role
          any: true

  # ----- kube-state-metrics -----
  - it: creates kube-state-metrics SA when enabled
    template: kinetica_operators.yaml
    set:
      kubeStateMetrics.install: true
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: kube-state-metrics
          any: true

  - it: creates kube-state-metrics ClusterRole when enabled
    template: kinetica_operators.yaml
    set:
      kubeStateMetrics.install: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kube-state-metrics
          any: true

  - it: creates kube-state-metrics ClusterRoleBinding when enabled
    template: kinetica_operators.yaml
    set:
      kubeStateMetrics.install: true
    asserts:
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: kube-state-metrics
          any: true

  - it: creates kube-state-metrics Service when enabled
    template: kinetica_operators.yaml
    set:
      kubeStateMetrics.install: true
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: kube-state-metrics
          any: true

  - it: creates kube-state-metrics Deployment when enabled
    template: kinetica_operators.yaml
    set:
      kubeStateMetrics.install: true
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: kube-state-metrics
          any: true

  - it: no kube-state-metrics resources when disabled
    template: kinetica_operators.yaml
    set:
      kubeStateMetrics.install: false
    asserts:
      - not: true
        containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: kube-state-metrics
          any: true
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: kube-state-metrics
          any: true
      - not: true
        containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: kube-state-metrics
          any: true
