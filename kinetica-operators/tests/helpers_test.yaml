suite: Helpers (image helper tested via DB operator Deployment)
values:
  - __base_values.yaml

tests:
  - it: constructs image as registry/repository:tag
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: kineticaoperator-controller-manager
          any: true
      - equal:
          path: spec.template.spec.containers[0].image
          value: "test.registry.io/kinetica-k8s-operator:v0.0.1-test"
        documentSelector:
          path: metadata.name
          value: kineticaoperator-controller-manager

  - it: uses digest when provided (overrides tag)
    template: kinetica_operators.yaml
    set:
      dbOperator.image.digest: "sha256:abcdef1234567890"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "test.registry.io/kinetica-k8s-operator@sha256:abcdef1234567890"
        documentSelector:
          path: metadata.name
          value: kineticaoperator-controller-manager

  - it: omits registry prefix when empty
    template: kinetica_operators.yaml
    set:
      global.image.registry: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "kinetica-k8s-operator:v0.0.1-test"
        documentSelector:
          path: metadata.name
          value: kineticaoperator-controller-manager

  - it: constructs wb operator image correctly
    template: kinetica_operators.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[1].image
          value: "test.registry.io/workbench-operator:v0.0.1-test"
        documentSelector:
          path: metadata.name
          value: workbench-operator-controller-manager
