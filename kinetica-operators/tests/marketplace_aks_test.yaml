suite: marketPlace/aks dispatch
# NOTE: The chart references kinetica-operators.aks-dboperator-operator which
# has no corresponding template file yet. Tests disable dbOperator to avoid
# that missing include and verify the resources that ARE testable.
values:
  - __base_values.yaml

tests:
  - it: renders for marketPlace/aks with dbOperator disabled
    template: kinetica_operators.yaml
    set:
      environment: "marketPlace"
      provider: "aks"
      dbOperator.install: false
    asserts:
      - notFailedTemplate: {}

  - it: creates WB operator Deployment for marketPlace/aks
    template: kinetica_operators.yaml
    set:
      environment: "marketPlace"
      provider: "aks"
      dbOperator.install: false
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: workbench-operator-controller-manager
          any: true

  - it: creates namespaces via wb-only path
    template: kinetica_operators.yaml
    set:
      environment: "marketPlace"
      provider: "aks"
      dbOperator.install: false
    asserts:
      - containsDocument:
          kind: Namespace
          apiVersion: v1
          name: gpudb
          any: true
