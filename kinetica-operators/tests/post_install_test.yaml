suite: Post-install secret patch Job
values:
  - __base_values.yaml

tests:
  - it: no post-install Job when no secret names
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.licenseSecretName: ""
      dbAdminUser.adminUserSecretName: ""
    asserts:
      - not: true
        containsDocument:
          kind: Job
          apiVersion: batch/v1
          name: RELEASE-NAME-post-install-secret-patch
          any: true
      - not: true
        containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-patch-secrets-script
          any: true

  - it: creates post-install Job when licenseSecretName set
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.licenseSecretName: "my-license-secret"
    asserts:
      - containsDocument:
          kind: Job
          apiVersion: batch/v1
          name: RELEASE-NAME-post-install-secret-patch
          any: true
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-patch-secrets-script
          any: true

  - it: creates post-install Job when adminUserSecretName set
    template: kinetica_operators.yaml
    set:
      dbAdminUser.adminUserSecretName: "my-admin-secret"
    asserts:
      - containsDocument:
          kind: Job
          apiVersion: batch/v1
          name: RELEASE-NAME-post-install-secret-patch
          any: true
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-patch-secrets-script
          any: true

  - it: Job has post-install hook annotation
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.licenseSecretName: "my-license-secret"
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: "post-install,post-upgrade"
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-post-install-secret-patch

  - it: mounts license secret volume when licenseSecretName set
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.licenseSecretName: "my-license-secret"
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: license-secret
            secret:
              secretName: my-license-secret
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-post-install-secret-patch
