suite: WB operator Deployment, RBAC, ConfigMap
values:
  - __base_values.yaml

tests:
  - it: creates WB operator Deployment when installed
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: workbench-operator-controller-manager
          any: true

  - it: creates WB operator ServiceAccount
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: workbench-operator-service-account
          any: true

  - it: creates WB operator metrics Service
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: workbench-operator-controller-manager-metrics-service
          any: true

  - it: creates workbench-tmpl ConfigMap
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: workbench-tmpl
          any: true

  - it: creates WB manager Role in cluster namespace
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: workbench-operator-manager-role
          namespace: gpudb
          any: true

  - it: creates WB manager RoleBinding in cluster namespace
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: workbench-operator-manager-rolebinding
          namespace: gpudb
          any: true

  - it: creates WB leader election Role
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: workbench-operator-leader-election-role
          any: true

  - it: suppresses all WB resources when disabled
    template: kinetica_operators.yaml
    set:
      wbOperator.install: false
    asserts:
      - not: true
        containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: workbench-operator-controller-manager
          any: true
      - not: true
        containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: workbench-operator-service-account
          any: true
      - not: true
        containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: workbench-tmpl
          any: true

  - it: wb-only path still creates namespaces
    template: kinetica_operators.yaml
    set:
      dbOperator.install: false
      wbOperator.install: true
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: workbench-operator-controller-manager
          any: true
      - containsDocument:
          kind: Namespace
          apiVersion: v1
          name: gpudb
          any: true
