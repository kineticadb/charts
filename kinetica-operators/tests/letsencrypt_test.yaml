suite: Let's Encrypt issuers
values:
  - __base_values.yaml

tests:
  # NOTE: The chart's orchestrator (line 175) uses `kindOf .letsEncrypt.enabled`
  # which returns "bool" (truthy) regardless of the actual boolean value.
  # This means letsEncrypt.enabled: false still renders the staging issuer.
  # This is a known chart bug. The certManager.install gate (tested below)
  # is the reliable way to suppress issuers.
  - it: staging issuer still rendered when letsEncrypt disabled (kindOf bug)
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.letsEncrypt.enabled: false
    asserts:
      - not: true
        containsDocument:
          kind: ClusterIssuer
          apiVersion: cert-manager.io/v1
          name: letsencrypt-production
          any: true
      - containsDocument:
          kind: ClusterIssuer
          apiVersion: cert-manager.io/v1
          name: letsencrypt-staging
          any: true

  - it: creates production ClusterIssuer when letsEncrypt production
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.letsEncrypt.enabled: true
      kineticacluster.gpudbCluster.letsEncrypt.environment: "production"
    asserts:
      - containsDocument:
          kind: ClusterIssuer
          apiVersion: cert-manager.io/v1
          name: letsencrypt-production
          any: true

  - it: creates staging ClusterIssuer when letsEncrypt staging
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.letsEncrypt.enabled: true
      kineticacluster.gpudbCluster.letsEncrypt.environment: "staging"
    asserts:
      - containsDocument:
          kind: ClusterIssuer
          apiVersion: cert-manager.io/v1
          name: letsencrypt-staging
          any: true

  - it: no issuers when certManager disabled regardless of letsEncrypt
    template: kinetica_operators.yaml
    set:
      certManager.install: false
      kineticacluster.gpudbCluster.letsEncrypt.enabled: true
      kineticacluster.gpudbCluster.letsEncrypt.environment: "production"
    asserts:
      - not: true
        containsDocument:
          kind: ClusterIssuer
          apiVersion: cert-manager.io/v1
          name: letsencrypt-production
          any: true

  - it: production issuer uses ACME production server
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.letsEncrypt.enabled: true
      kineticacluster.gpudbCluster.letsEncrypt.environment: "production"
    asserts:
      - equal:
          path: spec.acme.server
          value: "https://acme-v02.api.letsencrypt.org/directory"
        documentSelector:
          path: metadata.name
          value: letsencrypt-production

  - it: staging issuer uses ACME staging server
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.letsEncrypt.enabled: true
      kineticacluster.gpudbCluster.letsEncrypt.environment: "staging"
    asserts:
      - equal:
          path: spec.acme.server
          value: "https://acme-staging-v02.api.letsencrypt.org/directory"
        documentSelector:
          path: metadata.name
          value: letsencrypt-staging
