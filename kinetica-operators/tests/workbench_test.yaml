suite: Workbench SA, Role, RoleBinding, TLS
values:
  - __base_values.yaml

tests:
  - it: creates workbench ServiceAccount when installed
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: workbench-service-account
          namespace: gpudb
          any: true

  - it: creates workbench Role
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: workbench
          namespace: gpudb
          any: true

  - it: creates workbench RoleBinding
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: workbench
          namespace: gpudb
          any: true

  - it: suppresses workbench resources when disabled
    template: kinetica_operators.yaml
    set:
      workbench.install: false
    asserts:
      - not: true
        containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: workbench-service-account
          namespace: gpudb
          any: true
      - not: true
        containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: workbench
          namespace: gpudb
          any: true

  - it: creates workbench-tls Secret for localhost with letsEncrypt
    template: kinetica_operators.yaml
    set:
      workbench.fqdn: "localhost"
      workbench.letsEncrypt.enabled: true
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: workbench-tls
          namespace: gpudb
          any: true

  - it: no workbench-tls Secret when fqdn is not localhost
    template: kinetica_operators.yaml
    set:
      workbench.fqdn: "my.domain.com"
      workbench.letsEncrypt.enabled: true
    asserts:
      - not: true
        containsDocument:
          kind: Secret
          apiVersion: v1
          name: workbench-tls
          namespace: gpudb
          any: true
