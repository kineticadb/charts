suite: DB admin user resources
values:
  - __base_values.yaml

tests:
  - it: creates admin-pwd Secret when create is true
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: admin-pwd
          namespace: gpudb
          any: true

  - it: creates KineticaUser with default admin name
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: KineticaUser
          apiVersion: app.kinetica.com/v1
          name: kadmin
          namespace: gpudb
          any: true

  - it: creates global-admin-system-admin KineticaGrant
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: KineticaGrant
          apiVersion: app.kinetica.com/v1
          name: global-admin-system-admin
          namespace: gpudb
          any: true

  - it: creates user-specific KineticaGrant
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: KineticaGrant
          apiVersion: app.kinetica.com/v1
          name: kadmin-global-admin-create
          namespace: gpudb
          any: true

  - it: creates pre-delete Job
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Job
          apiVersion: batch/v1
          name: RELEASE-NAME-pre-delete-job
          any: true

  - it: creates pre-delete ConfigMap
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-delete-script
          any: true

  - it: suppresses all admin resources when create is false
    template: kinetica_operators.yaml
    set:
      dbAdminUser.create: false
    asserts:
      - not: true
        containsDocument:
          kind: Secret
          apiVersion: v1
          name: admin-pwd
          any: true
      - not: true
        containsDocument:
          kind: KineticaUser
          apiVersion: app.kinetica.com/v1
          name: kadmin
          any: true
      - not: true
        containsDocument:
          kind: KineticaGrant
          apiVersion: app.kinetica.com/v1
          name: global-admin-system-admin
          any: true
      - not: true
        containsDocument:
          kind: Job
          apiVersion: batch/v1
          name: RELEASE-NAME-pre-delete-job
          any: true

  - it: uses custom admin username
    template: kinetica_operators.yaml
    set:
      dbAdminUser.name: "myadmin"
    asserts:
      - containsDocument:
          kind: KineticaUser
          apiVersion: app.kinetica.com/v1
          name: myadmin
          namespace: gpudb
          any: true
      - containsDocument:
          kind: KineticaGrant
          apiVersion: app.kinetica.com/v1
          name: myadmin-global-admin-create
          namespace: gpudb
          any: true
