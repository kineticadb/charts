suite: OpenShift SCC resources
values:
  - __base_values.yaml

tests:
  - it: no SCCs when openshift is false
    template: kinetica_operators.yaml
    set:
      openshift: false
    asserts:
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-dboperator-scc
          any: true
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-otel-scc
          any: true
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-ingress-nginx-scc
          any: true

  - it: creates dboperator SCC when openshift true and dbOperator installed
    template: kinetica_operators.yaml
    set:
      openshift: true
    asserts:
      - containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-dboperator-scc
          any: true

  - it: creates otel SCC when openshift true and otelCollector installed
    template: kinetica_operators.yaml
    set:
      openshift: true
    asserts:
      - containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-otel-scc
          any: true

  - it: creates ingress-nginx SCC when openshift true and ingressNginx installed
    template: kinetica_operators.yaml
    set:
      openshift: true
    asserts:
      - containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-ingress-nginx-scc
          any: true

  - it: no dboperator SCC when openshift true but dbOperator disabled
    template: kinetica_operators.yaml
    set:
      openshift: true
      dbOperator.install: false
    asserts:
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-dboperator-scc
          any: true

  - it: no otel SCC when openshift true but otelCollector disabled
    template: kinetica_operators.yaml
    set:
      openshift: true
      otelCollector.install: false
    asserts:
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-otel-scc
          any: true

  - it: no ingress SCC when openshift true but ingressNginx disabled
    template: kinetica_operators.yaml
    set:
      openshift: true
      ingressNginx.install: false
    asserts:
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-ingress-nginx-scc
          any: true
