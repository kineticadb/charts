suite: OpenShift SCC resources
values:
  - __base_values.yaml

# OpenShift (oscp) SecurityContextConstraints support was removed as part of
# the on-prem security hardening (rubix security item 2). The chart no longer
# emits any SecurityContextConstraints, regardless of the openshift flag.
tests:
  - it: no SCCs when openshift is false
    template: kinetica_operators.yaml
    set:
      openshift: false
    asserts:
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-dboperator-scc
          any: true
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-otel-scc
          any: true
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-ingress-nginx-scc
          any: true

  - it: still no SCCs when openshift is true
    template: kinetica_operators.yaml
    set:
      openshift: true
    asserts:
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-dboperator-scc
          any: true
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-otel-scc
          any: true
      - not: true
        containsDocument:
          kind: SecurityContextConstraints
          apiVersion: security.openshift.io/v1
          name: kinetica-ingress-nginx-scc
          any: true
