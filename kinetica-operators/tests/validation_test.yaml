suite: Fail-fast validators
values:
  - __base_values.yaml

tests:
  # ---------- environment validation ----------
  - it: rejects empty environment
    template: kinetica_operators.yaml
    set:
      environment: ""
    asserts:
      - failedTemplate:
          errorPattern: "Not an allowed environment"

  - it: rejects invalid environment
    template: kinetica_operators.yaml
    set:
      environment: "invalid"
    asserts:
      - failedTemplate:
          errorPattern: "Not an allowed environment"

  - it: accepts onPrem environment
    template: kinetica_operators.yaml
    asserts:
      - notFailedTemplate: {}

  # ---------- provider validation ----------
  - it: rejects invalid onPrem provider
    template: kinetica_operators.yaml
    set:
      environment: "onPrem"
      provider: "gcp"
    asserts:
      - failedTemplate:
          errorPattern: "Not an allowed provider"

  - it: rejects invalid saas provider
    template: kinetica_operators.yaml
    set:
      environment: "saas"
      provider: "aks"
    asserts:
      - failedTemplate:
          errorPattern: "Not an allowed provider"

  - it: rejects invalid marketPlace provider
    template: kinetica_operators.yaml
    set:
      environment: "marketPlace"
      provider: "gcp"
    asserts:
      - failedTemplate:
          errorPattern: "Not an allowed provider"

  - it: accepts onPrem/k3s
    template: kinetica_operators.yaml
    set:
      provider: "k3s"
    asserts:
      - notFailedTemplate: {}

  - it: accepts onPrem/eks
    template: kinetica_operators.yaml
    set:
      provider: "eks"
    asserts:
      - notFailedTemplate: {}

  - it: accepts onPrem/aks
    template: kinetica_operators.yaml
    set:
      provider: "aks"
    asserts:
      - notFailedTemplate: {}

  # ---------- deprecated key validation ----------
  - it: rejects deprecated .db key
    template: kinetica_operators.yaml
    set:
      db:
        someKey: "someValue"
    asserts:
      - failedTemplate:
          errorPattern: "Use '.kineticacluster' instead of '.db'"

  - it: rejects deprecated .dbWorkbench key
    template: kinetica_operators.yaml
    set:
      dbWorkbench:
        someKey: "someValue"
    asserts:
      - failedTemplate:
          errorPattern: "Use '.workbench' instead of '.dbWorkbench'"

  # ---------- license validation ----------
  # NOTE: The license validator (resolveLicense in _helpers.tpl) DOES work
  # correctly, but cannot be tested via helm-unittest because `set:` cannot
  # override subchart values to empty strings. The kineticacluster key maps
  # to a subchart dependency, and subchart value merging prevents the
  # override from taking effect. Verified via `helm template --set` which
  # correctly triggers the fail.

  # ---------- admin credentials secret validation ----------
  # Plaintext admin credentials were removed (rubix security item 1); a
  # pre-created secret is now required when dbAdminUser.create is true.
  - it: rejects create with no adminUserSecretName
    template: kinetica_operators.yaml
    set:
      dbAdminUser.create: true
      dbAdminUser.adminUserSecretName: ""
    asserts:
      - failedTemplate:
          errorPattern: "adminUserSecretName is required"

  # ---------- storage class validation ----------
  - it: rejects no storage class when generateStorageClasses is false
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.config.tieredStorage.generateStorageClasses: false
      kineticacluster.gpudbCluster.config.tieredStorage.persistTier.default.volumeClaim.spec.storageClassName: ""
      global.defaultStorageClass: ""
    asserts:
      - failedTemplate:
          errorPattern: "storage class must be provided"

  - it: accepts generateStorageClasses true with no explicit class
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.config.tieredStorage.generateStorageClasses: true
      kineticacluster.gpudbCluster.config.tieredStorage.persistTier.default.volumeClaim.spec.storageClassName: ""
      global.defaultStorageClass: ""
    asserts:
      - notFailedTemplate: {}

  - it: accepts explicit storageClassName
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.config.tieredStorage.generateStorageClasses: false
      kineticacluster.gpudbCluster.config.tieredStorage.persistTier.default.volumeClaim.spec.storageClassName: "my-sc"
      global.defaultStorageClass: ""
    asserts:
      - notFailedTemplate: {}

  - it: accepts global defaultStorageClass
    template: kinetica_operators.yaml
    set:
      kineticacluster.gpudbCluster.config.tieredStorage.generateStorageClasses: false
      kineticacluster.gpudbCluster.config.tieredStorage.persistTier.default.volumeClaim.spec.storageClassName: ""
      global.defaultStorageClass: "standard"
    asserts:
      - notFailedTemplate: {}

  # ---------- workbench clusterRef <-> kineticacluster consistency ----------
  # The base values already set matching kineticacluster.name / workbench.clusterRef.name
  # ("test-kc") and matching namespaces ("gpudb"), so the happy path is covered by the
  # many notFailedTemplate assertions above; these tests target the mismatch cases.

  - it: accepts matching clusterRef.name (base values)
    template: kinetica_operators.yaml
    asserts:
      - notFailedTemplate: {}

  - it: rejects mismatched clusterRef.name when both installed
    template: kinetica_operators.yaml
    set:
      kineticacluster.name: "cluster-a"
      workbench.clusterRef.name: "cluster-b"
    asserts:
      - failedTemplate:
          errorPattern: "workbench.clusterRef.name .* must match kineticacluster.name"

  - it: accepts realigned clusterRef.name when both installed
    template: kinetica_operators.yaml
    set:
      kineticacluster.name: "cluster-a"
      workbench.clusterRef.name: "cluster-a"
    asserts:
      - notFailedTemplate: {}

  - it: matches the KineticaCluster default name when kineticacluster.name is empty
    template: kinetica_operators.yaml
    set:
      kineticacluster.name: ""
      workbench.clusterRef.name: "kineticacluster"
    asserts:
      - notFailedTemplate: {}

  - it: rejects clusterRef.name that ignores the empty-name default
    template: kinetica_operators.yaml
    set:
      kineticacluster.name: ""
      workbench.clusterRef.name: "something-else"
    asserts:
      - failedTemplate:
          errorPattern: "must match kineticacluster.name .*kineticacluster"

  - it: skips the check when the workbench is not installed
    template: kinetica_operators.yaml
    set:
      workbench.install: false
      kineticacluster.name: "cluster-a"
      workbench.clusterRef.name: "cluster-b"
    asserts:
      - notFailedTemplate: {}

  - it: skips the check when the kineticacluster is not installed
    template: kinetica_operators.yaml
    set:
      kineticacluster.install: false
      kineticacluster.name: "cluster-a"
      workbench.clusterRef.name: "cluster-b"
    asserts:
      - notFailedTemplate: {}

  # ---- namespace consistency ----
  # When clusterRef.namespace is unset the operator resolves the KineticaCluster in the
  # Workbench's own namespace, so the Workbench and KineticaCluster namespaces must agree.
  # When clusterRef.namespace is set it must point at the KineticaCluster's namespace.

  - it: accepts an unset clusterRef.namespace when WB and KC share a namespace
    template: kinetica_operators.yaml
    set:
      kineticacluster.namespace: "gpudb"
      workbench.namespace: "gpudb"
      # workbench.clusterRef.namespace intentionally left unset
    asserts:
      - notFailedTemplate: {}

  - it: rejects an unset clusterRef.namespace when WB and KC namespaces differ
    template: kinetica_operators.yaml
    set:
      kineticacluster.namespace: "gpudb"
      workbench.namespace: "other-ns"
      # workbench.clusterRef.namespace intentionally left unset
    asserts:
      - failedTemplate:
          errorPattern: "the Workbench namespace .* must match the KineticaCluster's namespace"

  - it: accepts an explicit clusterRef.namespace that matches the KC even if WB differs
    template: kinetica_operators.yaml
    set:
      kineticacluster.namespace: "gpudb"
      workbench.namespace: "other-ns"
      workbench.clusterRef.namespace: "gpudb"
    asserts:
      - notFailedTemplate: {}

  - it: accepts a matching explicit clusterRef.namespace
    template: kinetica_operators.yaml
    set:
      kineticacluster.namespace: "gpudb"
      workbench.namespace: "gpudb"
      workbench.clusterRef.namespace: "gpudb"
    asserts:
      - notFailedTemplate: {}

  - it: rejects a mismatched explicit clusterRef.namespace
    template: kinetica_operators.yaml
    set:
      kineticacluster.namespace: "gpudb"
      workbench.namespace: "gpudb"
      workbench.clusterRef.namespace: "other-ns"
    asserts:
      - failedTemplate:
          errorPattern: "workbench.clusterRef.namespace .* must match the KineticaCluster's namespace"
