suite: Node and StorageClass optional ClusterRoles
values:
  - __base_values.yaml

tests:
  # ----- nodes ClusterRole -----
  - it: no node ClusterRole by default
    template: kinetica_operators.yaml
    asserts:
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role-nodes
          any: true

  - it: creates node ClusterRole when enabled
    template: kinetica_operators.yaml
    set:
      dbOperator.rbac.installClusterRoles.nodes: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role-nodes
          any: true

  - it: creates node ClusterRoleBinding when enabled
    template: kinetica_operators.yaml
    set:
      dbOperator.rbac.installClusterRoles.nodes: true
    asserts:
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-rolebinding-nodes
          any: true

  - it: no node ClusterRole when explicitly disabled
    template: kinetica_operators.yaml
    set:
      dbOperator.rbac.installClusterRoles.nodes: false
    asserts:
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role-nodes
          any: true
      - not: true
        containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-rolebinding-nodes
          any: true

  # ----- storageClasses ClusterRole -----
  - it: no storage ClusterRole by default
    template: kinetica_operators.yaml
    asserts:
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role-storage-classes
          any: true

  - it: creates storage ClusterRole when enabled
    template: kinetica_operators.yaml
    set:
      dbOperator.rbac.installClusterRoles.storageClasses: true
    asserts:
      - containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role-storage-classes
          any: true

  - it: creates storage ClusterRoleBinding when enabled
    template: kinetica_operators.yaml
    set:
      dbOperator.rbac.installClusterRoles.storageClasses: true
    asserts:
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-rolebinding-storage-classes
          any: true

  - it: no storage ClusterRole when explicitly disabled
    template: kinetica_operators.yaml
    set:
      dbOperator.rbac.installClusterRoles.storageClasses: false
    asserts:
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role-storage-classes
          any: true
      - not: true
        containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-rolebinding-storage-classes
          any: true

  # ----- requires dbOperator to be installed -----
  - it: no optional ClusterRoles when dbOperator disabled
    template: kinetica_operators.yaml
    set:
      dbOperator.install: false
      dbOperator.rbac.installClusterRoles.nodes: true
      dbOperator.rbac.installClusterRoles.storageClasses: true
    asserts:
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role-nodes
          any: true
      - not: true
        containsDocument:
          kind: ClusterRole
          apiVersion: rbac.authorization.k8s.io/v1
          name: manager-role-storage-classes
          any: true
