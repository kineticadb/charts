suite: onPrem/kind full resource presence
values:
  - __base_values.yaml

tests:
  - it: renders successfully with base values
    template: kinetica_operators.yaml
    asserts:
      - notFailedTemplate: {}

  # ----- DB Operator core resources -----
  - it: creates DB operator ServiceAccount
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: controller-manager
          any: true

  - it: creates DB operator Deployment
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: kineticaoperator-controller-manager
          any: true

  - it: creates DB operator metrics Service
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: kineticaoperator-controller-manager-metrics-service
          any: true

  - it: creates DB operator webhook Service
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: kineticaoperator-webhook-service
          any: true

  - it: creates MutatingWebhookConfiguration
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: MutatingWebhookConfiguration
          apiVersion: admissionregistration.k8s.io/v1
          name: kineticaoperator-mutating-webhook-configuration
          any: true

  - it: creates ValidatingWebhookConfiguration
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ValidatingWebhookConfiguration
          apiVersion: admissionregistration.k8s.io/v1
          name: kineticaoperator-validating-webhook-configuration
          any: true

  - it: creates self-signed Issuer
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Issuer
          apiVersion: cert-manager.io/v1
          name: kineticaoperator-selfsigned-issuer
          any: true

  - it: creates metrics Certificate
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Certificate
          apiVersion: cert-manager.io/v1
          name: kineticaoperator-metrics-certs
          any: true

  - it: creates serving Certificate
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Certificate
          apiVersion: cert-manager.io/v1
          name: kineticaoperator-serving-cert
          any: true

  # ----- WB Operator -----
  - it: creates WB operator Deployment
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: workbench-operator-controller-manager
          any: true

  - it: creates WB operator ServiceAccount
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: workbench-operator-service-account
          any: true

  - it: creates WB operator metrics Service
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Service
          apiVersion: v1
          name: workbench-operator-controller-manager-metrics-service
          any: true

  # ----- ConfigMaps -----
  - it: creates gpudb-tmpl ConfigMap
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: gpudb-tmpl
          any: true

  - it: creates workbench-tmpl ConfigMap
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: workbench-tmpl
          any: true

  - it: creates fluent-bit-config ConfigMap
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: fluent-bit-config
          any: true

  # ----- Namespaces -----
  - it: creates cert-manager Namespace
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Namespace
          apiVersion: v1
          name: cert-manager
          any: true

  - it: creates gpudb Namespace
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Namespace
          apiVersion: v1
          name: gpudb
          any: true

  # ----- Admin user (provisioned by the post-install hook, not static docs) -----
  - it: creates post-install secret-patch Job
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Job
          apiVersion: batch/v1
          name: RELEASE-NAME-post-install-secret-patch
          any: true

  - it: creates post-install patch-secrets script ConfigMap
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ConfigMap
          apiVersion: v1
          name: RELEASE-NAME-patch-secrets-script
          any: true

  - it: hook script provisions the admin KineticaUser
    template: kinetica_operators.yaml
    asserts:
      - matchRegex:
          path: data["patch-secrets.sh"]
          pattern: "kind: KineticaUser"
        documentSelector:
          path: metadata.name
          value: RELEASE-NAME-patch-secrets-script

  # ----- Ingress RBAC -----
  - it: creates ingress-nginx Role
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: Role
          apiVersion: rbac.authorization.k8s.io/v1
          name: ingress-nginx
          any: true

  - it: creates ingress-nginx RoleBinding
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: RoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          name: ingress-nginx
          any: true

  # ----- Workbench -----
  - it: creates workbench ServiceAccount
    template: kinetica_operators.yaml
    asserts:
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          name: workbench-service-account
          any: true

  # ----- Negative: disabling operators -----
  - it: suppresses DB operator Deployment when disabled
    template: kinetica_operators.yaml
    set:
      dbOperator.install: false
    asserts:
      - not: true
        containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: kineticaoperator-controller-manager
          any: true

  - it: suppresses WB operator Deployment when disabled
    template: kinetica_operators.yaml
    set:
      wbOperator.install: false
    asserts:
      - not: true
        containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: workbench-operator-controller-manager
          any: true
