suite: NetworkPolicy
templates:
  - netpol.yaml
values:
  - __base_values.yaml

tests:
  - it: creates no resources when networkPolicies.install is false
    set:
      networkPolicies.install: false
    asserts:
      - hasDocuments:
          count: 0

  - it: creates two NetworkPolicies when enabled
    set:
      networkPolicies.install: true
    asserts:
      - hasDocuments:
          count: 2

  - it: creates allow-from-kinetica-system NetworkPolicy
    set:
      networkPolicies.install: true
    release:
      namespace: kinetica-system
    documentIndex: 0
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: allow-from-kinetica-system
      - equal:
          path: metadata.namespace
          value: gpudb

  - it: creates allow-egress-to-gpudb NetworkPolicy
    set:
      networkPolicies.install: true
    documentIndex: 1
    asserts:
      - isKind:
          of: NetworkPolicy
      - equal:
          path: metadata.name
          value: allow-egress-to-gpudb
