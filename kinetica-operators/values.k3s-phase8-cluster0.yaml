# Phase 8: Multi-cluster validation -- Cluster 0
# Helm install namespace: kinetica-system-cluster0 (operators + NGINX controller)
# Data namespace: gpudb-cluster0 (KineticaCluster pods, workbench, LDAP)
# FQDN: kinetica.local (shared with cluster1)
# Routing: K3s Traefik -> per-cluster NGINX (ClusterIP) -> backend pods
#
# CRITICAL: Do NOT add "ingress-nginx".namespaceOverride -- NGINX must deploy
# to the Helm install namespace (kinetica-system-cluster0) so Traefik
# IngressRoutes can find the controller Service there.

environment: onPrem
provider: k3s

global:
  defaultStorageClass: local-path
  kineticaClusterName: "cluster0"

# --- Kinetica Cluster ---
kineticacluster:
  install: true
  name: cluster0
  pathPrefix: "cluster0"
  namespace: gpudb-cluster0
  ldap:
    namespace: gpudb-cluster0
  ingressClassName: "nginx-cluster0"
  gpudbCluster:
    clusterName: cluster0
    fqdn: kinetica.local
    resources:
      requests:
        cpu: "2"
        memory: 2Gi
      limits:
        cpu: "4"
        memory: 4Gi
    config:
      processes:
        asyncIoThreads: "4"
      tieredStorage:
        globalTier:
          colocateDisks: true
        persistTier:
          default:
            limit: 50Gi
            provisioner: rancher.io/local-path
            volumeClaim:
              spec:
                storageClassName: local-path
  hostManagerMonitor:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

# --- Workbench ---
workbench:
  pathPrefix: "cluster0"
  storageClass: local-path
  namespace: gpudb-cluster0
  fqdn: kinetica.local
  ingressClassName: "nginx-cluster0"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# --- OpenLDAP ---
openldap:
  openldapNamespace: "gpudb-cluster0"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# --- Operators ---
dbOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

wbOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

# --- Disable cert-manager ---
certManager:
  install: false

# --- Ingress-nginx: ClusterIP service, scoped to data namespace ---
# NGINX controller deploys to Helm install namespace (kinetica-system-cluster0).
# Traefik routes /cluster0/* to this controller's ClusterIP Service.
# No namespaceOverride -- this is intentional and critical.
ingressNginx:
  install: true
"ingress-nginx":
  namespaceOverride: ""
  fullnameOverride: "ingress-nginx-cluster0"
  rbac:
    create: true
    scope: false
  controller:
    electionID: "ingress-controller-leader-cluster0"
    ingressClassResource:
      name: "nginx-cluster0"
      controllerValue: "k8s.io/ingress-nginx-cluster0"
    ingressClass: "nginx-cluster0"
    allowSnippetAnnotations: true
    watchIngressWithoutClass: true
    config:
      use-forwarded-headers: "true"
    hostNetwork: false
    hostPort:
      enabled: false
    kind: DaemonSet
    metrics:
      enabled: true
      serviceMonitor:
        enabled: false
    publishService:
      enabled: true
    service:
      enabled: true
      type: ClusterIP
    scope:
      enabled: true
      namespace: "gpudb-cluster0"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

# --- Disable non-essential components ---
networkPolicies:
  install: false

supportBundle:
  install: false

otelCollector:
  install: false

upsertKineticaCrds:
  enabled: false
